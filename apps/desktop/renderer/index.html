<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monsoon Sovereigns</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #111111;
        color: #f4efe6;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(680px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #cfc6b8;
        font-size: 15px;
        line-height: 1.6;
      }

      code {
        color: #92d6c8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Monsoon Sovereigns</h1>
      <p id="status">Checking desktop security boundary...</p>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
